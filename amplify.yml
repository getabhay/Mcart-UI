version: 1
applications:
  - appRoot: .
    frontend:
      phases:
        preBuild:
          commands:
            - npm ci
        build:
          commands:
            - npm run build
      env:
        variables:
          SEARCH_SERVICE_BASE_URL: http://localhost:8081
          PRODUCT_SERVICE_BASE_URL: http://localhost:8080
      artifacts:
        baseDirectory: .next
        files:
          - "**/*"
      cache:
        paths:
          - node_modules/**/*
